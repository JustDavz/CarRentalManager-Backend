# Importa i valori segreti dal file env.properties nella radice del progetto
spring.config.import=optional:file:env.properties

# Porta su cui viene avviato il server Spring Boot
server.port=8080

# Configurazione della connessione al database PostgreSQL
spring.datasource.url=${PG_URL}
spring.datasource.username=${PG_USERNAME}
spring.datasource.password=${PG_PASSWORD}
spring.datasource.driver-class-name=${PG_DRIVER}

# Configurazione JPA e Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Configurazione JWT per autenticazione e scadenza del token
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS}

# Abilita il seeder dei dati demo all'avvio
app.seed.enabled=true

# Credenziali Cloudinary per il caricamento immagini
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Credenziali Mailgun per l'invio delle email
mailgun.domain=${MAILGUN_DOMAIN}
mailgun.api-key=${MAILGUN_API_KEY}
mailgun.sender=${MAILGUN_SENDER}